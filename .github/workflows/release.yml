name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish services
        run: |
          dotnet publish src/Argus.Watchdog -c Release -r win-x64 --self-contained true
          dotnet publish src/Argus.Defender -c Release -r win-x64 --self-contained true
          dotnet publish src/Argus.Recovery -c Release -r win-x64 --self-contained true
          dotnet publish src/Argus.Scanner -c Release -r win-x64 --self-contained true

      - name: Package release
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v',''
          Compress-Archive -Path src/Argus.Watchdog/bin/Release/net8.0-windows/win-x64/publish/*,src/Argus.Defender/bin/Release/net8.0-windows/win-x64/publish/*,src/Argus.Recovery/bin/Release/net8.0-windows/win-x64/publish/*,src/Argus.Scanner/bin/Release/net8.0-windows/win-x64/publish/* -DestinationPath "Argus-v${tag}-win-x64.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Argus-v*.zip
          generate_release_notes: true
